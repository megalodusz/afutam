<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mátrix Futam - Pályaválasztó</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --surface: #1e1e1e; --text: #ffffff; --accent: #292929; --error: #ff4444; }
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; overscroll-behavior: none; }
        .app-container { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        header h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin: 5px 0; text-transform: uppercase; }
        .timer-section { background: var(--surface); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); }
        #stopper-kijelzo { font-family: monospace; font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        #uzenet { font-size: 1.2rem; min-height: 3.5em; color: #ccc; line-height: 1.4; font-weight: 500; }
        .scanner-section { flex-grow: 1; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); position: relative; }
        #olvaso-terulet { width: 100% !important; }
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        button { padding: 14px; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; font-size: 0.85rem; }
        #save-btn { background: var(--primary); color: #000; display: none; }
        #abort-btn { background: var(--error); color: #fff; display: none; }
        .btn-reset { background: var(--accent); color: #aaa; }
        .btn-exit { background: #444; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>Mátrix Futam</h1></header>
    <div class="timer-section">
        <div id="stopper-kijelzo">00:00.0</div>
        <p id="uzenet">Melyik pályát szeretnéd választani?<br><small>Olvasd be a pálya kódját!</small></p>
    </div>
    <div class="scanner-section"><div id="olvaso-terulet"></div></div>
    <div class="controls">
        <button id="save-btn">Eredmény Mentése (.txt)</button>
        <button id="abort-btn">Futam Feladása</button>
        
        <button class="btn-exit" onclick="kilepes()">Kilépés</button>
    </div>
</div>

<script>
    function kilepes() {
        if (confirm("Bezárja az ablakot?")) {
            window.close();
            setTimeout(() => { alert("Kérjük, zárja be az ablakot manuálisan!"); }, 500);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const kijelzo = document.getElementById('stopper-kijelzo');
        const uzenet = document.getElementById('uzenet');
        const saveBtn = document.getElementById('save-btn');
        const abortBtn = document.getElementById('abort-btn');
        const html5QrCode = new Html5Qrcode("olvaso-terulet");
        
        let stopperFut = false, kezdIdo, intervallum, utolsoKod = "", utolsoIdo = 0;
        let sorrend = []; 
        let sorrendIndex = 0;

        function frissit() {
            const eltelt = Date.now() - kezdIdo;
            const p = Math.floor(eltelt / 60000);
            const m = Math.floor((eltelt % 60000) / 1000);
            const tized = Math.floor((eltelt % 1000) / 100);
            kijelzo.textContent = `${String(p).padStart(2,'0')}:${String(m).padStart(2,'0')}.${tized}`;
        }

        async function onScanSuccess(decodedText) {
            const most = Date.now();
            const szoveg = decodedText.toLowerCase().trim();
            if (szoveg === utolsoKod && (most - utolsoIdo < 2000)) return;

            // 1. PÁLYAVÁLASZTÁS ÉS RAJT (start:pontok)
            if (szoveg.startsWith('start:') && !stopperFut) {
                try {
                    const palyaAdat = szoveg.replace('start:', '');
                    sorrend = palyaAdat.split(',').map(s => s.trim()).filter(s => s !== "");
                    
                    if (sorrend.length > 0) {
                        kezdIdo = Date.now(); stopperFut = true; sorrendIndex = 0;
                        utolsoKod = szoveg; utolsoIdo = most;
                        intervallum = setInterval(frissit, 100);
                        uzenet.innerHTML = `<b style="color:var(--primary)">PÁLYA ELINDULT!</b><br>Következő pont: <b>${sorrend[0]}</b>`;
                        saveBtn.style.display = "none";
                        abortBtn.style.display = "block";
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                } catch(e) {
                    uzenet.innerHTML = "<b style='color:var(--error)'>Hibás pálya kód!</b>";
                }
                return;
            }

            if (stopperFut) {
                // 2. ELLENŐRZŐ PONTOK
                if (szoveg === sorrend[sorrendIndex]) {
                    utolsoKod = szoveg; utolsoIdo = most;
                    sorrendIndex++;
                    if (navigator.vibrate) navigator.vibrate(50);
                    if (sorrendIndex === sorrend.length) {
                        uzenet.innerHTML = "<b>Minden pont megvan!</b><br>Irány a <b style='color:var(--primary)'>CÉL</b>!";
                    } else {
                        uzenet.innerHTML = `Sikeres pontfogás: ${szoveg}<br>Következő: <b style='color:var(--primary)'>${sorrend[sorrendIndex]}</b>`;
                    }
                } 
                // 3. STOP KÓD
                else if (szoveg === 'stop') {
                    if (sorrendIndex === sorrend.length) {
                        stopperFut = false;
                        clearInterval(intervallum);
                        uzenet.innerHTML = "<b style='color:var(--primary)'>Ügyes voltál!</b><br>Célba értél!";
                        saveBtn.style.display = "block";
                        abortBtn.style.display = "none";
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        html5QrCode.stop().catch(() => {}); 
                    } else {
                        uzenet.innerHTML = `<b style='color:var(--error)'>HIÁNYZÓ PONTOK!</b><br>Kell még: ${sorrend.slice(sorrendIndex).join(', ')}`;
                    }
                }
                // 4. ROSSZ PONT VAGY ÚJRA-START PRÓBÁLKOZÁS
                else if (szoveg !== utolsoKod) {
                    if (szoveg.startsWith('start:')) {
                        uzenet.innerHTML = "<b style='color:var(--error)'>A futam már fut!</b><br>Előbb add fel a jelenlegit.";
                    } else {
                        uzenet.innerHTML = `<b style='color:var(--error)'>Nem ez következik!</b><br>Keresd ezt: <b style='color:var(--primary)'>${sorrend[sorrendIndex]}</b>`;
                    }
                }
            }
        }

        abortBtn.addEventListener('click', () => {
            if (confirm("Valóban feladod a pályát? <br> Az eddigi eredményed el fog veszni! </br>")) {
                stopperFut = false;
                clearInterval(intervallum);
                kijelzo.textContent = "00:00.0";
                uzenet.innerHTML = "Melyik pályát szeretnéd választani?<br><small>Olvasd be a pálya kódját!</small>";
                abortBtn.style.display = "none";
                sorrend = [];
                utolsoKod = "";
            }
        });

        saveBtn.addEventListener('click', () => {
            const nev = prompt("Neved:", "Versenyző");
            if (!nev) return;
            const tartalom = `--- Mátrix FUTAM ---\nNév: ${nev}\nIdő: ${kijelzo.textContent}\nPontok: ${sorrend.join(',')}`;
            const blob = new Blob([tartalom], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `eredmeny_${nev}.txt`;
            link.click();
        });

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
            .catch(err => uzenet.innerHTML = "<span style='color:var(--error)'>Kamera hiba!</span>");
    });
</script>
</body>
</html>
